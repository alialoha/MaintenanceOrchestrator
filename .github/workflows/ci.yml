name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Materialize synthetic overlays
        run: |
          python scripts/materialize_phase3_data.py

      - name: Run unit/integration tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q

  browser-e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run browser e2e tests
        env:
          PYTHONPATH: src
          RUN_BROWSER_TESTS: "1"
        run: |
          pytest -q tests/test_web_browser_e2e.py
